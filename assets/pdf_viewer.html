<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PDF — select and send to Claude</title>
<script src="/.fig_thumbs/pdfjs/pdf.min.js"></script>
<style>
  body{margin:0;background:#18181b;color:#e4e4e7;font-family:-apple-system,sans-serif}
  header{position:sticky;top:0;z-index:10;background:rgba(39,39,42,.97);border-bottom:1px solid #3f3f46;
         padding:10px 16px;display:flex;gap:12px;align-items:center;font-size:13px}
  #pages{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px}
  .pg{position:relative;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.5)}
  .pg canvas{display:block}
  .textLayer{position:absolute;inset:0;overflow:hidden;line-height:1;opacity:1;user-select:none}
  .textLayer span{position:absolute;color:transparent;white-space:pre;transform-origin:0 0;cursor:text}
  .textLayer span.hl{background:rgba(255,213,74,.55);border-radius:2px}
  #sendBtn{position:fixed;display:none;z-index:100;background:#3f3f46;color:#e4e4e7;border:1px solid #52525b;
           border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .muted{color:#a1a1aa}
</style>
</head>
<body>
<header>
  <b id="fname">PDF</b>
  <span class="muted">Highlight a passage — Claude can access it automatically ("my selection")</span>
  <span id="selinfo" style="margin-left:auto;color:#ffd54a"></span>
  <span class="muted" id="status"></span>
</header>
<div id="pages"></div>
<button id="sendBtn">➜ Claude</button>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "/.fig_thumbs/pdfjs/pdf.worker.min.js";

const rel = new URLSearchParams(location.search).get("file");
document.getElementById("fname").textContent = rel ? rel.split("/").pop() : "(no file)";
let selPage = 1;

async function main(){
  const pdf = await pdfjsLib.getDocument({url: "/" + rel,
    standardFontDataUrl: "/.fig_thumbs/pdfjs/standard_fonts/",
    cMapUrl: "/.fig_thumbs/pdfjs/cmaps/", cMapPacked: true}).promise;
  const wrap = document.getElementById("pages");
  const scale = Math.min(1.6, (window.innerWidth - 60) / 612);
  for(let n = 1; n <= pdf.numPages; n++){
    const page = await pdf.getPage(n);
    const vp = page.getViewport({scale});
    const div = document.createElement("div");
    div.className = "pg"; div.dataset.page = n;
    div.style.width = vp.width + "px"; div.style.height = vp.height + "px";
    const cv = document.createElement("canvas");
    cv.width = vp.width * devicePixelRatio; cv.height = vp.height * devicePixelRatio;
    cv.style.width = vp.width + "px"; cv.style.height = vp.height + "px";
    div.appendChild(cv);
    const tl = document.createElement("div");
    tl.className = "textLayer";
    div.appendChild(tl);
    wrap.appendChild(div);
    const ctx = cv.getContext("2d");
    ctx.scale(devicePixelRatio, devicePixelRatio);
    await page.render({canvasContext: ctx, viewport: vp, intent: "print"}).promise;
    const tc = await page.getTextContent();
    buildTextLayer(tc, tl, vp);
    tl._order = readingOrder(tl, vp.width);
  }
}

// Couche texte maison : un span par item, largeur EXACTE tiree du PDF
// (item.width), glyphes etires par scaleX — plus de boites trop larges.
const _measureCv = document.createElement("canvas");
const _measureCtx = _measureCv.getContext("2d");
function buildTextLayer(tc, tl, vp){
  for(const item of tc.items){
    if(!item.str || !item.str.trim()) continue;
    const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
    const fontSize = Math.hypot(tx[2], tx[3]);
    const w = item.width * vp.scale;
    if(fontSize <= 0 || w <= 0) continue;
    const s = document.createElement("span");
    s.textContent = item.str;
    s.style.left = tx[4] + "px";
    s.style.top = (tx[5] - fontSize) + "px";
    s.style.fontSize = fontSize + "px";
    s.style.fontFamily = "sans-serif";
    s.dataset.l = tx[4]; s.dataset.t = tx[5] - fontSize; s.dataset.r = tx[4] + w;
    _measureCtx.font = fontSize + "px sans-serif";
    const nat = _measureCtx.measureText(item.str).width;
    if(nat > 0) s.style.transform = "scaleX(" + (w / nat) + ")";
    tl.appendChild(s);
  }
}

// Ordre de lecture par colonnes : trouve la gouttiere verticale (bande en x
// traversee par presque aucun span) et trie colonne par colonne, puis (y, x).
function readingOrder(tl, pageW){
  const spans = [...tl.querySelectorAll("span")].filter(s => s.textContent.trim());
  const boxes = spans.map(s => ({s,
    l: parseFloat(s.dataset.l), t: parseFloat(s.dataset.t), r: parseFloat(s.dataset.r)}));
  // detection de gouttiere sur les spans etroits seulement
  // (les lignes pleine largeur — titres, pieds de page — sont ignorees)
  const narrow = boxes.filter(b => (b.r - b.l) <= pageW*0.55);
  let bestX = null, bestCross = Infinity;
  for(let x = pageW*0.35; x <= pageW*0.65; x += pageW*0.01){
    const cross = narrow.reduce((n,b)=> n + (b.l < x-6 && b.r > x+6 ? 1 : 0), 0);
    if(cross < bestCross){ bestCross = cross; bestX = x; }
  }
  const twoCols = narrow.length > 10 && bestCross <= Math.max(2, narrow.length*0.05);
  const key = b => {
    const wide = (b.r - b.l) > pageW*0.55;
    const col = (twoCols && !wide && (b.l + b.r)/2 >= bestX) ? 1 : 0;
    return [col, Math.round(b.t/4), b.l];
  };
  boxes.sort((a,b)=>{
    const ka = key(a), kb = key(b);
    return ka[0]-kb[0] || ka[1]-kb[1] || ka[2]-kb[2];
  });
  return boxes.map(b => b.s);
}

const btn = document.getElementById("sendBtn");
let anchorIdx = null, dragLayer = null, layerSpans = [];
function clearHl(){
  document.querySelectorAll(".textLayer span.hl").forEach(s=>s.classList.remove("hl"));
  document.getElementById("selinfo").textContent = "";
}
let _selPushT = null;
function pushSelInfo(lines, words, text){
  clearTimeout(_selPushT);
  _selPushT = setTimeout(()=>{
    fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({lines, words, text: text||"", rel, name: rel?rel.split("/").pop():"", page: selPage})
    }).catch(()=>{});
  }, 150);
}
function updateSelInfo(){
  const hl = [...document.querySelectorAll(".textLayer span.hl")];
  if(!hl.length) return;
  const rows = new Set(hl.map(s => s.closest(".pg").dataset.page + ":" + Math.round(parseFloat(s.dataset.t)/4)));
  const words = hl.map(s => s.textContent).join(" ").trim().split(/\s+/).length;
  pushSelInfo(rows.size, words, hl.map(s=>s.textContent).join(" ").replace(/\s+/g," ").trim());
}
function spanAt(tl, x, y){
  // span sous le pointeur, sinon le plus proche sur la meme ligne
  const el = document.elementFromPoint(x, y);
  if(el && el.tagName === "SPAN" && el.closest(".textLayer") === tl && el.textContent.trim()) return el;
  let best = null, bd = 1e9;
  for(const s of layerSpans){
    const b = s.getBoundingClientRect();
    if(y < b.top - 4 || y > b.bottom + 4) continue;
    const dx = x < b.left ? b.left - x : (x > b.right ? x - b.right : 0);
    if(dx < bd){ bd = dx; best = s; }
  }
  return best;
}
document.addEventListener("pointerdown", e => {
  const tl = e.target.closest(".textLayer");
  btn.style.display = "none";
  clearHl();
  if(!tl) return;
  dragLayer = tl;
  layerSpans = tl._order || [...tl.querySelectorAll("span")].filter(s => s.textContent.trim());
  const s = spanAt(tl, e.clientX, e.clientY);
  anchorIdx = s ? layerSpans.indexOf(s) : null;
  e.preventDefault();
});
document.addEventListener("pointermove", e => {
  if(anchorIdx === null || !dragLayer) return;
  const s = spanAt(dragLayer, e.clientX, e.clientY);
  if(!s) return;
  const i = layerSpans.indexOf(s);
  const a = Math.min(anchorIdx, i), b = Math.max(anchorIdx, i);
  layerSpans.forEach((sp, k) => sp.classList.toggle("hl", k >= a && k <= b));
  updateSelInfo();
});
document.addEventListener("pointerup", e => {
  if(anchorIdx === null || !dragLayer) return;
  anchorIdx = null;
  layerSpansLast = layerSpans;
  const hls = layerSpans.filter(s => s.classList.contains("hl"));
  if(!hls.length){ dragLayer = null; return; }
  const pg = dragLayer.closest(".pg");
  if(pg) selPage = pg.dataset.page;
  dragLayer = null;
});
function hlText(){
  const spans = layerSpansLast.filter(s => s.classList.contains("hl"));
  return spans.map(s => s.textContent).join(" ").replace(/\s+/g, " ").trim();
}
let layerSpansLast = [];
btn.onclick = async () => {
  const text = hlText();
  btn.textContent = "⏳";
  try{
    const r = await fetch("/quote", {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({rel, page: selPage, text})});
    const j = await r.json();
    document.getElementById("status").textContent =
      j.sentToClaude ? "Pasted into Claude ✓" : "Copied to clipboard ✓";
  }catch(e){
    document.getElementById("status").textContent = "Server error";
  }
  btn.textContent = "➜ Claude"; btn.style.display = "none";
  setTimeout(()=>document.getElementById("status").textContent="", 3000);
};

if(rel) main();
</script>
</body>
</html>
