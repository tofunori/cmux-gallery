<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Markdown</title>
<script src="marked.min.js"></script>
<script src="purify.min.js"></script>
<link rel="stylesheet" href="/.fig_thumbs/cm/codemirror.min.css">
<link rel="stylesheet" href="/.fig_thumbs/cm/material-darker.min.css">
<script src="/.fig_thumbs/cm/codemirror.min.js"></script>
<script src="/.fig_thumbs/cm/mark-selection.min.js"></script>
<script src="/.fig_thumbs/cm/markdown.min.js"></script>
<style>
:root{--bg:#202024;--card:#27272a;--card2:#1f1f23;--txt:#e4e4e7;--muted:#a1a1aa;--accent:#5b9dff;--border:#3f3f46}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       font-size:15px;line-height:1.6;display:flex;flex-direction:column}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:7px 14px;
         display:flex;gap:10px;align-items:center;font-size:12.5px;flex-shrink:0}
  #fname{font-weight:600}
  header .seg{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
  header .seg button{background:transparent;border:none;border-right:1px solid var(--border);
         color:var(--muted);padding:0 12px;height:24px;line-height:24px;font-size:11.5px;
         white-space:nowrap;cursor:pointer;transition:background .12s,color .12s}
  header .seg button:last-child{border-right:none}
  header .seg button:hover{color:var(--txt)}
  header .seg button.on{background:var(--border);color:var(--txt)}
  #state{color:var(--muted);margin-left:4px}
  #state.dirty{color:#ffd54a}
  #state.saved{color:#7ec97e}
  #state.conflict{color:#ff6b6b}
  #hint{margin-left:auto;color:var(--muted);font-size:11.5px}
  #body{flex:1;display:flex;min-height:0}
  #edPane{flex:1;min-width:0;display:none;flex-direction:column;border-right:1px solid var(--border)}
  #edPane.show{display:flex}
  .CodeMirror{flex:1;height:auto;font-size:13px;font-family:"SF Mono",Menlo,monospace;line-height:1.55}
  .CodeMirror .CodeMirror-selected{background:transparent !important}
  .CodeMirror-focused .CodeMirror-selected{background:transparent !important}
  .CodeMirror-selectedtext{background:rgba(91,157,255,.45) !important;border-radius:2px}
  .cm-clsel{background:rgba(255,213,74,.16);box-shadow:0 1px 0 rgba(255,213,74,.4)}
  #prevPane{flex:1;min-width:0;overflow-y:auto;display:none}
  #prevPane.show{display:block}
  #wrap{max-width:860px;margin:0 auto;padding:24px 36px 60px}
  h1,h2,h3{line-height:1.3;border-bottom:1px solid var(--border);padding-bottom:6px}
  a{color:var(--accent)}
  code{background:var(--card2);padding:2px 5px;border-radius:4px;font-size:13px}
  pre{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto}
  pre code{background:none;padding:0}
  table{border-collapse:collapse;margin:14px 0;display:block;overflow-x:auto}
  th,td{border:1px solid var(--border);padding:6px 12px}
  th{background:var(--card)}
  blockquote{margin:0;padding:2px 16px;border-left:3px solid var(--accent);color:var(--muted)}
  img{max-width:100%}
  hr{border:none;border-top:1px solid var(--border)}
  #err{color:#ff6b6b;padding:40px;text-align:center}
</style>
<script>(function(){var T={'Default':{bg:'#202024',card:'#27272a',card2:'#1f1f23',txt:'#e4e4e7',muted:'#a1a1aa',accent:'#5b9dff',border:'#3f3f46'},'Codex One':{bg:'#202024',card:'#2f343f',card2:'#21252b',txt:'#abb2bf',muted:'#7f848e',accent:'#4d78cc',border:'#3e4451'},'Dracula':{bg:'#282a36',card:'#343746',card2:'#21222c',txt:'#f8f8f2',muted:'#9aa0b3',accent:'#bd93f9',border:'#44475a'},'Nord':{bg:'#2e3440',card:'#3b4252',card2:'#272c36',txt:'#e5e9f0',muted:'#9aa3b2',accent:'#88c0d0',border:'#434c5e'}};var t;try{t=T[localStorage.getItem('figTheme')];}catch(e){}t=t||T['Default'];var r=document.documentElement.style;for(var k in t)r.setProperty('--'+k,t[k]);})();</script>
</head>
<body>
<header>
  <b id="fname"></b>
  <div class="seg">
    <button id="mPrev" class="on">Preview</button>
    <button id="mSplit">Side by side</button>
    <button id="mEdit">Edit</button>
  </div>
  <span id="state"></span>
  <span id="hint">Cmd+S: save · selection visible to Claude</span>
</header>
<div id="body">
  <div id="edPane"></div>
  <div id="prevPane" class="show"><div id="wrap">Loading…</div></div>
</div>
<script>
const params = new URLSearchParams(location.search);
// path = absolute path (for /code + /codesave); file = relative path (for <base> images)
const path = params.get("path");
const file = params.get("file") || "";
const wrap = document.getElementById("wrap");
const stateEl = document.getElementById("state");
const fname = path ? path.split("/").pop() : (file.split("/").pop() || "(markdown)");
document.getElementById("fname").textContent = fname;
document.title = fname;

// base pour que les images relatives du markdown se resolvent contre le serveur statique du projet
if(file){
  const dir = file.split("/").slice(0,-1).join("/");
  const b = document.createElement("base");
  b.href = "/" + (dir ? dir.split("/").map(encodeURIComponent).join("/") + "/" : "");
  document.head.appendChild(b);
}

let cm = null, diskMtime = 0, dirty = false, loaded = false, srcText = "";
function setState(cls, txt){ stateEl.className = cls; stateEl.textContent = txt; }
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function renderPreview(text){ srcText = text || ""; wrap.innerHTML = DOMPurify.sanitize(marked.parse(srcText)); }

// --- chargement via /code (text + mtime) ; repli lecture seule via fetch brut ---
async function load(){
  if(!path){
    try{
      const r = await fetch("/" + file.split("/").map(encodeURIComponent).join("/"));
      if(!r.ok) throw new Error(r.status);
      renderPreview(await r.text());
    }catch(e){ wrap.innerHTML = '<div id="err">Unable to load ' + esc(file) + ' (' + esc(e.message) + ')</div>'; }
    return;
  }
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(j.error){ wrap.innerHTML = '<div id="err">' + esc(j.error) + '</div>'; return; }
    diskMtime = j.mtime;
    renderPreview(j.text);
    if(cm){ const cur = cm.getCursor(); cm.setValue(j.text); cm.setCursor(cur); }
    loaded = true; dirty = false; setState("saved", "saved");
  }catch(e){ wrap.innerHTML = '<div id="err">Server off — ' + esc(e.message) + '</div>'; }
}

function initEditor(text){
  if(cm) return;
  cm = CodeMirror(document.getElementById("edPane"), {
    value: text != null ? text : "", mode: "markdown", theme: "material-darker",
    lineNumbers: true, lineWrapping: true, viewportMargin: 50, styleSelectedText: true
  });
  cm.on("change", (_, ch) => {
    renderPreview(cm.getValue());
    if(ch.origin !== "setValue"){ dirty = true; setState("dirty", "modified"); }
  });
  let selT = null;
  cm.on("cursorActivity", () => {
    clearTimeout(selT);
    selT = setTimeout(() => {
      const sel = cm.getSelection();
      if(sel && sel.trim() && path){
        const f = cm.getCursor("from"), t = cm.getCursor("to");
        if(window._clMark) window._clMark.clear();
        window._clMark = cm.markText(f, t, {className: "cm-clsel"});
        fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            lines: t.line - f.line + 1, words: sel.trim().split(/\s+/).length,
            text: sel, rel: file || path, name: fname, page: "L" + (f.line+1) + "-" + (t.line+1)
          })}).catch(()=>{});
      }
    }, 200);
  });
}

async function save(){
  if(!cm || !path) return;
  const r = await fetch("/codesave", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path, text: cm.getValue(), mtime: diskMtime})});
  const j = await r.json();
  if(j.error === "conflit"){
    setState("conflict", "conflict: the file changed on disk — reload or re-save to overwrite");
    diskMtime = j.mtime; return;
  }
  if(j.error){ setState("conflict", j.error); return; }
  diskMtime = j.mtime; dirty = false;
  setState("saved", "saved " + new Date().toLocaleTimeString());
}

// --- modes d'affichage ---
const edPane = document.getElementById("edPane"), prevPane = document.getElementById("prevPane");
const btns = {prev: document.getElementById("mPrev"), split: document.getElementById("mSplit"), edit: document.getElementById("mEdit")};
function setMode(m){
  if((m === "split" || m === "edit") && !path){ return; } // no absolute path -> no editing
  Object.values(btns).forEach(b => b.classList.remove("on"));
  btns[m].classList.add("on");
  edPane.classList.toggle("show", m === "split" || m === "edit");
  prevPane.classList.toggle("show", m === "prev" || m === "split");
  if(m === "split" || m === "edit"){
    if(!cm) initEditor(srcText);   // first pass: fill the editor with the loaded text
    setTimeout(() => cm && cm.refresh(), 0);
  }
  document.getElementById("hint").style.display = (m === "prev") ? "none" : "";
}
btns.prev.onclick = () => setMode("prev");
btns.split.onclick = () => setMode("split");
btns.edit.onclick = () => setMode("edit");

document.addEventListener("keydown", e => {
  if((e.metaKey || e.ctrlKey) && e.key === "s"){ e.preventDefault(); save(); }
  if((e.metaKey || e.ctrlKey) && e.key === "e"){ e.preventDefault(); setMode(edPane.classList.contains("show") ? "prev" : "split"); }
  if(e.key === "Escape"){
    if(window._clMark){ window._clMark.clear(); window._clMark = null; }
    fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({lines:0, words:0})}).catch(()=>{});
  }
});

// auto-reload if the file changes on disk while the buffer is clean (Claude qui edite)
setInterval(async () => {
  if(dirty || !path) return;
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(j.mtime && Math.abs(j.mtime - diskMtime) > 0.001){
      diskMtime = j.mtime; renderPreview(j.text);
      if(cm){ const cur = cm.getCursor(), sc = cm.getScrollInfo(); cm.setValue(j.text); cm.setCursor(cur); cm.scrollTo(sc.left, sc.top); }
      setState("saved", "reloaded (modified on disk) " + new Date().toLocaleTimeString());
    }
  }catch(e){}
}, 2000);

load();
</script>
</body>
</html>
