<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LaTeX Studio</title>
<link rel="stylesheet" href="/.fig_thumbs/cm/codemirror.min.css">
<link rel="stylesheet" href="/.fig_thumbs/cm/material-darker.min.css">
<script src="/.fig_thumbs/cm/codemirror.min.js"></script>
<script src="/.fig_thumbs/cm/mark-selection.min.js"></script>
<script src="/.fig_thumbs/cm/stex.min.js"></script>
<script src="/.fig_thumbs/pdfjs/pdf.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#18181b;color:#e4e4e7;
            font-family:-apple-system,sans-serif;display:flex;flex-direction:column;overflow:hidden}
  header{background:#27272a;border-bottom:1px solid #3f3f46;padding:7px 14px;
         display:flex;gap:12px;align-items:center;font-size:12.5px;flex-shrink:0}
  header button{background:transparent;color:#a1a1aa;border:1px solid #3f3f46;
                border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
  header button:hover{color:#e4e4e7;border-color:#52525b}
  #build{background:#52525b;color:#e4e4e7;border-color:#52525b}
  #build:hover{background:#5b5b63;border-color:#5b5b63}
  #state{color:#a1a1aa;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #state.err{color:#ff6b6b;white-space:pre-wrap}
  #state.ok{color:#7ec97e}
  #state.dirty{color:#ffd54a}
  #split{flex:1;display:flex;min-height:0}
  #left{width:50%;display:flex;flex-direction:column;border-right:1px solid #3f3f46;min-width:0}
  #right{flex:1;overflow:auto;background:#1f1f23;position:relative;scrollbar-gutter:stable}
  .CodeMirror{flex:1;height:auto;font-size:13px;font-family:"SF Mono",Menlo,monospace;line-height:1.5}
  .pdfpage{position:relative;margin:10px auto;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.5);cursor:crosshair}
  .pdfpage canvas{display:block}
  #marker{position:absolute;left:0;right:0;height:22px;background:rgba(91,157,255,.25);
          border-left:3px solid #5b9dff;pointer-events:none;display:none;z-index:5}
  .cm-syncline{background:rgba(91,157,255,.18)}
  /* la selection colle au texte (mark-selection) au lieu de remplir la ligne */
  .CodeMirror .CodeMirror-selected{background:transparent !important}
  .CodeMirror-focused .CodeMirror-selected{background:transparent !important}
  .CodeMirror-selectedtext{background:rgba(91,157,255,.45) !important;box-shadow:none !important;border-radius:2px}
  /* derniere selection envoyee a Claude : marque persistante */
  .cm-clsel{background:rgba(255,213,74,.16);box-shadow:0 1px 0 rgba(255,213,74,.4)}
  #picker{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:200;
          align-items:flex-start;justify-content:center;padding-top:8vh}
  #picker.show{display:flex}
  #pickerBox{background:#27272a;border:1px solid #3f3f46;border-radius:10px;width:520px;
             max-height:70vh;display:flex;flex-direction:column;overflow:hidden;
             box-shadow:0 8px 40px rgba(0,0,0,.6)}
  #pickerPath{padding:10px 14px;font-size:11.5px;color:#a1a1aa;border-bottom:1px solid #3f3f46;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #pickerList{overflow-y:auto;flex:1}
  #pickerList div{padding:7px 14px;font-size:13px;cursor:pointer;display:flex;gap:8px}
  #pickerList div:hover{background:#3f3f46}
  #pickerList .d{color:#5b9dff}
</style>
</head>
<body>
<header>
  <b id="fname"></b>
  <button id="build">Compile</button>
  <button id="openFile" style="background:transparent;color:#a1a1aa;border:1px solid #3f3f46;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">Open…</button>
  <button id="togglePdf">PDF</button>
  <button id="popPdf" title="Open the PDF in a separate tab">↗</button>
  <button id="zoomOut" title="Zoom out">−</button>
  <button id="zoomFit" title="Fit to width">⤢</button>
  <button id="zoomIn" title="Zoom in">+</button>
  <span id="state"></span>
  <span style="margin-left:auto;color:#a1a1aa">⌘S save · ⌘J source→PDF · click PDF→source</span>
</header>
<div id="split">
  <div id="left"></div>
  <div id="right"><div id="marker"></div></div>
</div>
<div id="picker"><div id="pickerBox">
  <div id="pickerPath"></div>
  <div id="pickerList"></div>
</div></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "/.fig_thumbs/pdfjs/pdf.worker.min.js";
const path = new URLSearchParams(location.search).get("path");
let pdfPath = path ? path.replace(/\.tex$/, ".pdf") : null;
if(path) fetch("/texroot?path=" + encodeURIComponent(path)).then(r=>r.json()).then(j=>{
  if(j.pdf){ pdfPath = j.pdf; loadPdf(); }
}).catch(()=>{});
document.getElementById("fname").textContent = path ? path.split("/").pop() : "(no file)";
document.title = path ? path.split("/").pop() : "LaTeX Studio";

let cm = null, diskMtime = 0, dirty = false, pdfDoc = null, pageEls = [], pdfVps = [];
let zoom = parseFloat(localStorage.getItem("texZoom") || "1");
const stateEl = document.getElementById("state");
const setState = (cls, txt) => { stateEl.className = cls; stateEl.textContent = txt; };

async function load(){
  const r = await fetch("/code?path=" + encodeURIComponent(path));
  const j = await r.json();
  if(j.error) return setState("err", j.error);
  recentsAdd(path);
  diskMtime = j.mtime;
  cm = CodeMirror(document.getElementById("left"), {
    value: j.text, mode: "stex", theme: "material-darker",
    lineNumbers: true, lineWrapping: true, viewportMargin: 50, styleSelectedText: true
  });
  cm.on("change", (_, ch) => { if(ch.origin !== "setValue"){ dirty = true; setState("dirty", "modified"); } });
  let selT = null;
  cm.on("cursorActivity", () => {
    clearTimeout(selT);
    selT = setTimeout(() => {
      const sel = cm.getSelection();
      const f = cm.getCursor("from"), t = cm.getCursor("to");
      if(sel && sel.trim()){
        if(window._clMark) window._clMark.clear();
        window._clMark = cm.markText(f, t, {className: "cm-clsel"});
        fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            lines: t.line - f.line + 1, words: sel.trim().split(/\s+/).length,
            text: sel, rel: path, name: path.split("/").pop(),
            page: "L" + (f.line+1) + "-" + (t.line+1)
          })}).catch(()=>{});
      }
    }, 200);
  });
  loadPdf();
}

async function save(){
  const r = await fetch("/codesave", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path, text: cm.getValue(), mtime: diskMtime})});
  const j = await r.json();
  if(j.error === "conflit"){ setState("err", "disk conflict — re-⌘S to overwrite"); diskMtime = j.mtime; return false; }
  diskMtime = j.mtime; dirty = false; setState("ok", "saved");
  return true;
}

async function compile(){
  if(dirty && !(await save())) return;
  setState("dirty", "compiling…");
  const r = await fetch("/compile", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({path})});
  const j = await r.json();
  if(!j.ok) return setState("err", "✗ " + (j.error || "failed"));
  if(j.pdf) pdfPath = j.pdf;
  setState("ok", "✓ compiled " + new Date().toLocaleTimeString());
  loadPdf();
}

let _pdfToken = 0;
async function loadPdf(){
  const tok = ++_pdfToken;
  try{
    const doc = await pdfjsLib.getDocument({url: "/raw?path=" + encodeURIComponent(pdfPath) + "&t=" + Date.now(),
      standardFontDataUrl: "/.fig_thumbs/pdfjs/standard_fonts/", cMapUrl: "/.fig_thumbs/pdfjs/cmaps/", cMapPacked: true}).promise;
    if(tok !== _pdfToken) return;
    pdfDoc = doc;
    const right = document.getElementById("right");
    const scroll = right.scrollTop;
    [...right.querySelectorAll(".pdfpage")].forEach(e => e.remove());
    pageEls = []; pdfVps = [];
    _lastW = right.clientWidth;
    const w = (right.clientWidth - 24) * zoom;
    for(let n = 1; n <= doc.numPages; n++){
      if(tok !== _pdfToken) return;
      const page = await doc.getPage(n);
      const base = page.getViewport({scale: 1});
      const scale = w / base.width;
      const vp = page.getViewport({scale});
      const div = document.createElement("div");
      div.className = "pdfpage"; div.dataset.page = n;
      div.style.width = vp.width + "px"; div.style.height = vp.height + "px";
      const cv = document.createElement("canvas");
      cv.width = vp.width * devicePixelRatio; cv.height = vp.height * devicePixelRatio;
      cv.style.width = vp.width + "px"; cv.style.height = vp.height + "px";
      div.appendChild(cv);
      right.appendChild(div);
      pageEls[n] = div; pdfVps[n] = {scale, h: base.height};
      const ctx = cv.getContext("2d");
      ctx.scale(devicePixelRatio, devicePixelRatio);
      await page.render({canvasContext: ctx, viewport: vp, intent: "print"}).promise;
      div.onclick = e => {
        const r2 = div.getBoundingClientRect();
        synctexEdit(n, (e.clientX - r2.left) / pdfVps[n].scale, (e.clientY - r2.top) / pdfVps[n].scale);
      };
    }
    right.scrollTop = scroll;
  }catch(e){ /* pas encore de PDF */ }
}

async function synctexView(){
  if(!pdfDoc) return;
  const line = cm.getCursor().line + 1;
  const r = await fetch("/synctex", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({dir:"view", tex: path, pdf: pdfPath, line})});
  const j = await r.json();
  if(!j.page || !pageEls[j.page]) return setState("err", "synctex: no match");
  const el = pageEls[j.page], vp = pdfVps[j.page];
  const y = j.y * vp.scale;
  const marker = document.getElementById("marker");
  el.appendChild(marker);
  marker.style.top = (y - 14) + "px";
  marker.style.display = "block";
  el.scrollIntoView({block:"nearest"});
  document.getElementById("right").scrollTop = el.offsetTop + y - document.getElementById("right").clientHeight/2;
  setTimeout(() => marker.style.display = "none", 2500);
}

let lastSyncLine = null;
async function synctexEdit(page, x, y){
  const r = await fetch("/synctex", {method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({dir:"edit", tex: path, pdf: pdfPath, page, x, y})});
  const j = await r.json();
  if(!j.line) return setState("err", "synctex: no match");
  const ln = j.line - 1;
  cm.setCursor({line: ln, ch: 0});
  cm.scrollIntoView({line: ln, ch: 0}, 120);
  if(lastSyncLine !== null) cm.removeLineClass(lastSyncLine, "background", "cm-syncline");
  cm.addLineClass(ln, "background", "cm-syncline");
  lastSyncLine = ln;
  cm.focus();
}

document.getElementById("build").onclick = compile;
const rightEl = document.getElementById("right");
function applyPdfVisible(v){
  rightEl.style.display = v ? "" : "none";
  document.getElementById("left").style.width = v ? "50%" : "100%";
  document.getElementById("left").style.borderRight = v ? "" : "none";
  localStorage.setItem("texPdfVisible", v ? "1" : "0");
  if(cm) cm.refresh();
}
document.getElementById("togglePdf").onclick = () => applyPdfVisible(rightEl.style.display === "none");
function setZoom(z){
  zoom = Math.max(0.4, Math.min(3, z));
  localStorage.setItem("texZoom", zoom);
  loadPdf();
}
document.getElementById("zoomIn").onclick = () => setZoom(zoom * 1.2);
document.getElementById("zoomOut").onclick = () => setZoom(zoom / 1.2);
document.getElementById("zoomFit").onclick = () => setZoom(1);
let _rzT = null, _lastW = 0;
new ResizeObserver(() => {
  clearTimeout(_rzT);
  _rzT = setTimeout(() => {
    const w = rightEl.clientWidth;
    if(pdfDoc && Math.abs(w - _lastW) > 8){ _lastW = w; loadPdf(); }
  }, 500);
}).observe(rightEl);
document.getElementById("popPdf").onclick = () => {
  window.open("/raw?path=" + encodeURIComponent(pdfPath) + "&t=" + Date.now(), "_blank");
  applyPdfVisible(false);
};
if(localStorage.getItem("texPdfVisible") === "0") applyPdfVisible(false);
document.addEventListener("keydown", e => {
  if(e.key === "Escape"){
    if(cm){ cm.setCursor(cm.getCursor()); }
    if(window._clMark){ window._clMark.clear(); window._clMark = null; }
    fetch("/selinfo", {method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({lines:0, words:0})}).catch(()=>{});
    return;
  }
  if((e.metaKey || e.ctrlKey) && e.key === "s"){ e.preventDefault(); save(); }
  if((e.metaKey || e.ctrlKey) && e.key === "b"){ e.preventDefault(); compile(); }
  if((e.metaKey || e.ctrlKey) && e.key === "j"){ e.preventDefault(); synctexView(); }
});

// rechargement si Claude modifie le .tex sur disque
setInterval(async () => {
  if(dirty || !cm) return;
  try{
    const r = await fetch("/code?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(j.mtime && Math.abs(j.mtime - diskMtime) > 0.001){
      diskMtime = j.mtime;
      const cur = cm.getCursor(), s = cm.getScrollInfo();
      cm.setValue(j.text); cm.setCursor(cur); cm.scrollTo(s.left, s.top);
      dirty = false; setState("ok", "reloaded (modified on disk)");
    }
  }catch(e){}
}, 2000);

if(path) load();
else {
  setState("ok", "choose a .tex file");
  pickerShow("~/Documents/UTQR");
}


// fichiers recents (partages entre studio et editeur via localStorage)
function recentsGet(){ try{return JSON.parse(localStorage.getItem("studioRecents")||"[]")}catch(e){return []} }
function recentsAdd(p){
  let r = recentsGet().filter(x => x !== p);
  r.unshift(p); r = r.slice(0, 10);
  localStorage.setItem("studioRecents", JSON.stringify(r));
}
function openTarget(target){
  const page = target.endsWith(".tex") ? "latex_studio.html" : "code_editor.html";
  location.href = "/.fig_thumbs/" + page + "?path=" + encodeURIComponent(target);
}
// --- mini explorateur de fichiers (bouton Ouvrir) ---
const EDITABLE = /\.(tex|sty|bib|py|r|R|md|jl|sh|bash|txt|csv|json|yaml|yml|toml)$/;
async function pickerShow(dir){
  const r = await fetch("/ls?dir=" + encodeURIComponent(dir || (path ? path.replace(/\/[^/]*$/, "") : "~/Documents/UTQR")));
  const j = await r.json();
  if(j.error) return;
  document.getElementById("picker").classList.add("show");
  document.getElementById("pickerPath").textContent = j.path.replace(/^\/Users\/[^/]+/, "~");
  const list = document.getElementById("pickerList");
  list.innerHTML = "";
  const mk = (label, cls, fn) => {
    const d = document.createElement("div");
    d.innerHTML = label; d.className = cls; d.onclick = fn;
    list.appendChild(d);
  };
  const rec = recentsGet().filter(p => p !== path);
  if(rec.length){
    rec.forEach(p => mk("&#128337; " + p.split("/").pop() +
      ' <span style="color:#71717a;font-size:11px">' + p.replace(/^\/Users\/[^/]+\/Documents\//, "").replace(/\/[^/]*$/, "") + "</span>",
      "", () => openTarget(p)));
    const sep = document.createElement("div");
    sep.style.cssText = "border-bottom:1px solid #3f3f46;margin:4px 0;padding:0;height:1px;cursor:default";
    list.appendChild(sep);
  }
  if(j.parent) mk("&#8617; ..", "d", () => pickerShow(j.parent));
  j.items.filter(i => i.dir).forEach(i => mk("&#128193; " + i.name, "d", () => pickerShow(j.path + "/" + i.name)));
  j.items.filter(i => !i.dir && EDITABLE.test(i.name)).forEach(i =>
    mk(i.name, "", () => openTarget(j.path + "/" + i.name)));
}
document.getElementById("picker").onclick = e => { if(e.target.id === "picker") e.target.classList.remove("show"); };
document.addEventListener("keydown", e => { if(e.key === "Escape") document.getElementById("picker").classList.remove("show"); });

document.getElementById("openFile").onclick = () => pickerShow();
</script>
</body>
</html>
