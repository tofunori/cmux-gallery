<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SVG select</title>
<style>
  html,body{margin:0;height:100%;background:#18181b;color:#e4e4e7;
            font-family:-apple-system,BlinkMacSystemFont,sans-serif;display:flex;flex-direction:column;overflow:hidden}
  header{background:#27272a;border-bottom:1px solid #3f3f46;padding:7px 14px;
         display:flex;gap:12px;align-items:center;font-size:12.5px;flex-shrink:0}
  #fname{font-weight:600}
  #hint{color:#a1a1aa}
  #cur{margin-left:auto;color:#5b9dff;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;
       max-width:40%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #body{flex:1;display:flex;min-height:0}
  #stagewrap{flex:1;overflow:auto;padding:16px;box-sizing:border-box}
  #stage{position:relative;width:100%}
  #plot{width:100%;line-height:0}
  #plot svg{width:100%;height:auto;display:block;background:#fff;border-radius:6px;box-shadow:0 2px 14px rgba(0,0,0,.5)}
  #plot svg *{cursor:pointer}
  #ov{position:absolute;inset:0;pointer-events:none}
  .hbox{position:absolute;border:2px solid #5b9dff;border-radius:2px;background:rgba(91,157,255,.10)}
  .sbox{position:absolute;border:2px solid #ffce3a;border-radius:2px;background:rgba(255,206,58,.12)}
  .sbox .tg{position:absolute;top:-15px;left:-2px;font-size:10px;background:#ffce3a;color:#000;
            padding:0 4px;border-radius:3px;white-space:nowrap;font-family:ui-monospace,monospace}
  #side{width:290px;flex-shrink:0;border-left:1px solid #3f3f46;background:#1f1f23;display:flex;flex-direction:column}
  #side h3{margin:0;padding:10px 12px;font-size:12px;border-bottom:1px solid #3f3f46;color:#a1a1aa;font-weight:600}
  #sellist{flex:1;overflow:auto;padding:8px}
  #empty{color:#71717a;font-size:12px;padding:18px 12px;text-align:center;line-height:1.5}
  #empty code{background:#27272a;padding:1px 4px;border-radius:3px}
  .selitem{background:#27272a;border:1px solid #3f3f46;border-radius:7px;padding:8px 9px;margin-bottom:8px}
  .selitem .id{font-family:ui-monospace,Menlo,monospace;color:#ffce3a;font-size:11px;word-break:break-all}
  .selitem .rm{float:right;cursor:pointer;color:#ff6b6b;font-size:13px;line-height:1;margin-left:6px}
  .selitem input{width:100%;margin-top:6px;background:#18181b;border:1px solid #3f3f46;border-radius:5px;
                 color:#e4e4e7;padding:4px 6px;font-size:12px;box-sizing:border-box}
  #side footer{padding:10px 12px;border-top:1px solid #3f3f46;display:flex;gap:8px}
  #side footer button{flex:1;padding:7px;background:#3f3f46;color:#e4e4e7;border:none;border-radius:7px;cursor:pointer;font-size:12.5px}
  #side footer button:hover{background:#52525b}
  #dragtoggle{background:#3f3f46;color:#e4e4e7;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11.5px}
  #dragtoggle.on{background:#ffce3a;color:#000;font-weight:600}
  body.dragmode #plot svg *{cursor:move}
  body.dragmode #hint{display:none}
  #err{color:#ff6b6b;padding:40px;text-align:center}
</style>
</head>
<body>
<header>
  <b id="fname"></b>
  <span id="hint">hover = highlight · click = select an element · add notes →</span>
  <button id="dragtoggle" title="Drag any text/label to reposition it, then Save SVG">✥ Move labels</button>
  <span id="cur"></span>
</header>
<div id="body">
  <div id="stagewrap"><div id="stage">
    <div id="plot">Loading…</div>
    <div id="ov"></div>
  </div></div>
  <div id="side">
    <h3>Selection (<span id="n">0</span>)</h3>
    <div id="sellist"><div id="empty">Click any curve, label, axis or legend in the plot to select it.<br><br>Works on <b>SVG</b> plots (matplotlib <code>fig.savefig('x.svg')</code>) — a PNG is flat pixels with no elements to select.</div></div>
    <footer>
      <button id="clear">Clear</button>
      <button id="savesvg" title="Write the moved labels back into the .svg file on disk (keeps a .orig.bak)">💾 Save SVG</button>
      <button id="send" title="Write the selection to ~/.claude/fig-selection.json — then tell Claude &quot;ma sélection&quot;">▻ Send to Claude</button>
    </footer>
  </div>
</div>
<script>
const file = new URLSearchParams(location.search).get("file") || "";
document.getElementById("fname").textContent = file.split("/").pop();
document.title = file.split("/").pop() || "SVG";
const stage = document.getElementById("stage"), ov = document.getElementById("ov"), plot = document.getElementById("plot");
const cur = document.getElementById("cur"), sellist = document.getElementById("sellist");
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let svg = null, hbox = null;
const sel = new Map();                                   // id -> { el, note }
const CONTAINER = /^(figure|axes|matplotlib\.axis|xtick|ytick)_/;   // frames you select INTO, not themselves
function meaningful(el){
  let g = el && el.closest ? el.closest("[id]") : null;
  while(g && CONTAINER.test(g.id)) g = g.parentElement ? g.parentElement.closest("[id]") : null;
  return g;
}
function rectIn(el){                                     // bbox relative to #stage (so #ov children line up)
  const r = el.getBoundingClientRect(), s = stage.getBoundingClientRect();
  return { x: r.left - s.left, y: r.top - s.top, w: r.width, h: r.height };
}
function showHover(el){
  if(!el){ if(hbox){ hbox.remove(); hbox = null; } cur.textContent = ""; return; }
  const b = rectIn(el);
  if(!hbox){ hbox = document.createElement("div"); hbox.className = "hbox"; ov.appendChild(hbox); }
  hbox.style.cssText = `left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px`;
  cur.textContent = el.id;
}
function toggle(el){
  if(sel.has(el.id)) sel.delete(el.id); else sel.set(el.id, { el, note: "" });
  renderSel();
}
function renderSel(){
  ov.querySelectorAll(".sbox").forEach(b => b.remove());
  for(const [id, o] of sel){
    const b = rectIn(o.el), box = document.createElement("div");
    box.className = "sbox";
    box.style.cssText = `left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px`;
    box.innerHTML = `<span class="tg">${esc(id)}</span>`;
    ov.appendChild(box);
  }
  document.getElementById("n").textContent = sel.size;
  if(!sel.size){ sellist.innerHTML = '<div id="empty">Click any curve, label, axis or legend in the plot to select it.</div>'; return; }
  sellist.innerHTML = "";
  for(const [id, o] of sel){
    const d = document.createElement("div");
    d.className = "selitem";
    d.innerHTML = `<span class="rm" title="Remove">✕</span><span class="id">${esc(id)}</span>`;
    const inp = document.createElement("input");
    inp.placeholder = "note about this element…"; inp.value = o.note;
    inp.oninput = () => { o.note = inp.value; };
    d.querySelector(".rm").onclick = () => { sel.delete(id); renderSel(); };
    d.appendChild(inp);
    sellist.appendChild(d);
  }
}
document.getElementById("clear").onclick = () => { sel.clear(); renderSel(); };
document.getElementById("send").onclick = () => {
  if(!sel.size) return;
  const lines = [...sel].map(([id, o]) => "• " + id + (o.note ? " — " + o.note : ""));
  const text = "Selected elements of " + (file.split("/").pop() || "plot") + ":\n" + lines.join("\n");
  fetch("/selinfo", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text, rel: file, name: file.split("/").pop(), page: "elements",
                           lines: sel.size, words: text.split(/\s+/).length }) })
    .then(() => { const b = document.getElementById("send"); b.textContent = "Sent ✓"; setTimeout(() => b.textContent = "▻ Send to Claude", 1500); })
    .catch(() => {});
};

// ---- label drag mode: move any text/label, then Save SVG back to disk ----
let dragMode = false, drag = null, dirty = false;
const dragBtn = document.getElementById("dragtoggle");
dragBtn.onclick = () => {
  dragMode = !dragMode;
  dragBtn.classList.toggle("on", dragMode);
  document.body.classList.toggle("dragmode", dragMode);
  dragBtn.textContent = dragMode ? "✥ Moving — click to stop" : "✥ Move labels";
  showHover(null);
};
function svgPoint(evt, ref){                             // client px -> (ref or root) user units
  const p = svg.createSVGPoint(); p.x = evt.clientX; p.y = evt.clientY;
  return p.matrixTransform((ref || svg).getScreenCTM().inverse());
}
function onDown(e){
  if(!dragMode || !svg) return;
  const g = meaningful(e.target); if(!g) return;
  if(!g.querySelector("text, use")) return;             // only labels/legends/titles — not the bg patch/axes
  e.preventDefault();
  const ref = g.parentNode;                             // translate is applied in the parent's space
  const p = svgPoint(e, ref);
  if(!g.hasAttribute("data-orig")) g.setAttribute("data-orig", g.getAttribute("transform") || "");
  drag = { el: g, ref: ref, sx: p.x, sy: p.y,
           dx0: parseFloat(g.getAttribute("data-dx") || 0),
           dy0: parseFloat(g.getAttribute("data-dy") || 0) };
}
function onMove(e){
  if(drag){
    const p = svgPoint(e, drag.ref);
    const dx = drag.dx0 + (p.x - drag.sx), dy = drag.dy0 + (p.y - drag.sy);
    drag.el.setAttribute("data-dx", dx); drag.el.setAttribute("data-dy", dy);
    drag.el.setAttribute("transform", "translate(" + dx + "," + dy + ") " + drag.el.getAttribute("data-orig"));
    dirty = true; renderSel();
  } else if(!dragMode){
    showHover(meaningful(e.target));
  }
}
function onUp(){ drag = null; }
function saveSVG(){
  if(!svg) return;
  const b = document.getElementById("savesvg");
  const clone = svg.cloneNode(true);                     // strip bookkeeping attrs from the saved file
  clone.querySelectorAll("[data-orig]").forEach(el => {
    el.removeAttribute("data-orig"); el.removeAttribute("data-dx"); el.removeAttribute("data-dy");
  });
  const out = '<?xml version="1.0" encoding="utf-8" standalone="no"?>\n' + new XMLSerializer().serializeToString(clone);
  fetch("/save-svg", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ rel: file, name: file.split("/").pop(), svg: out }) })
    .then(r => r.json()).then(j => {
      b.textContent = (j && j.ok) ? "Saved ✓" : "Error"; if(j && j.ok) dirty = false;
      setTimeout(() => b.textContent = "💾 Save SVG", 1600);
    }).catch(() => { b.textContent = "Error"; setTimeout(() => b.textContent = "💾 Save SVG", 1600); });
}
document.getElementById("savesvg").onclick = saveSVG;

async function load(){
  try{
    const ver = new URLSearchParams(location.search).get("v") || "";
    const r = await fetch("/" + file.split("/").map(encodeURIComponent).join("/") + (ver ? "?v=" + ver : ""));
    if(!r.ok) throw new Error(r.status);
    const txt = await r.text();
    // DOMParser handles the <?xml?> + <!DOCTYPE> prefix that innerHTML mangles; CSS sizes it via viewBox
    const doc = new DOMParser().parseFromString(txt, "image/svg+xml");
    const root = doc.querySelector("svg");
    if(!root || doc.querySelector("parsererror")) throw new Error("could not parse SVG");
    svg = document.importNode(root, true);
    plot.textContent = "";
    plot.appendChild(svg);
    svg.addEventListener("mousedown", onDown);
    svg.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    svg.addEventListener("mouseleave", () => { if(!drag) showHover(null); });
    svg.addEventListener("click", e => { if(dragMode || drag) return; const g = meaningful(e.target); if(g) toggle(g); });
    try{ new ResizeObserver(() => renderSel()).observe(svg); }catch(e){}
  }catch(e){ plot.innerHTML = '<div id="err">Unable to load ' + esc(file) + ' (' + esc(e.message) + ')</div>'; }
}
window.addEventListener("resize", renderSel);
load();
</script>
</body>
</html>
